{# Macro reutilizable: enlaces "atrás" con la misma interacción en todas las vistas. #}
{% macro back_link(href, label) %}
<a class="back-link anim-fade-in" href="{{ href }}">
  <span class="back-link__icon" aria-hidden="true">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>
  <span class="back-link__text">{{ label }}</span>
</a>
{% endmacro %}
